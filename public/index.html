<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css" type="text/css" />
    <title>Home Page</title>
</head>
<body>
    <main class="hero">
        <h1 class="title">Hi student, Welcome to Sandy's University!</h1>
        <p class="subtitle">Sign up to access important notes, lectures, and class updates.</p>

        <form action="/addUser" method="POST" id="signupForm">
            <div class="field">
                <label for="email">Email</label>
                <input id="email" type="email" placeholder="jane@email.com" name="email" required>
            </div>
            <div class="field">
                <label for="username">Username</label>
                <input id="username" type="text" placeholder="Jane Doe" name="username" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input id="password" type="password" placeholder="password" name="password" required minlength="6">
            </div>

            <button id="formBtn" type="submit">Create Account</button>
        </form>
    </main>
</body>

</html>
